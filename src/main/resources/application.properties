spring.application.name=sis
spring.datasource.url=jdbc:mysql://localhost:3306/sisdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

jwt.secret=ChangeThisSecretKeyToAStrongRandomValue
jwt.expiration-ms=86400000

spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.web.resources.static-locations=classpath:/static/

# File Upload Configuration
file.upload.directory=C:/uploads/
file.upload.max-size=10485760

# Logging Configuration
logging.level.com.sis=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Security
spring.security.user.password=

# Email Configuration (Currently for logging - integrate with SMTP provider)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email Service Configuration
app.mail.enabled=false
app.frontend.url=http://localhost:8080

# CORS Configuration
cors.allowed-origins=http://localhost:8080,http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Server Configuration
server.port=8080
server.servlet.context-path=/
server.servlet.session.timeout=30m

# Multipart File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Attendance Configuration
attendance.marking.enabled=true
attendance.threshold.percentage=75

# Academic Configuration
academic.cgpa.scale=4.0
academic.grades.pass-mark=1.0

# Performance Monitoring
performance.monitoring.enabled=true
performance.metrics.retention.days=30
