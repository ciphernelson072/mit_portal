<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset - School Information System</title>
    <link rel="stylesheet" href="../css/forms.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 1rem;
        }

        .reset-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%;
            padding: 2rem;
        }

        .reset-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .reset-header h1 {
            color: #2c3e50;
            margin: 0;
            font-size: 1.8rem;
        }

        .reset-header p {
            color: #7f8c8d;
            margin: 0.5rem 0 0 0;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #2c3e50;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-reset {
            background: #667eea;
            color: white;
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-reset:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-reset:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .info-text {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-top: 1rem;
            text-align: center;
        }

        .back-link {
            text-align: center;
            margin-top: 1rem;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .step {
            flex: 1;
            height: 3px;
            background: #ecf0f1;
            border-radius: 2px;
        }

        .step.active {
            background: #667eea;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-header">
            <h1>🔐 Reset Password</h1>
            <p>Create a new secure password for your account</p>
        </div>

        <div class="step-indicator">
            <div class="step active" id="step1"></div>
            <div class="step" id="step2"></div>
            <div class="step" id="step3"></div>
        </div>

        <div id="message" class="message"></div>

        <!-- Token Validation Form -->
        <div id="tokenStep" style="display: block;">
            <form id="tokenForm" onsubmit="validateToken(event)">
                <div class="form-group">
                    <label for="token">Reset Token</label>
                    <input type="text" id="token" name="token" placeholder="Enter the token from your email" required>
                </div>
                <button type="submit" class="btn-reset">Validate Token</button>
            </form>
        </div>

        <!-- Password Reset Form -->
        <div id="passwordStep" style="display: none;">
            <form id="passwordForm" onsubmit="resetPassword(event)">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required minlength="6">
                </div>
                <p class="info-text">Password must be at least 6 characters long</p>
                <button type="submit" class="btn-reset">Reset Password</button>
            </form>
        </div>

        <!-- Success Message -->
        <div id="successStep" style="display: none; text-align: center;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">✅</div>
            <h2 style="color: #27ae60; margin-bottom: 1rem;">Password Reset Successful!</h2>
            <p style="color: #7f8c8d; margin-bottom: 2rem;">Your password has been successfully changed. You can now log in with your new password.</p>
            <button class="btn-reset" onclick="window.location.href='/login.html'" style="background: #27ae60;">Back to Login</button>
        </div>

        <div class="back-link">
            <a href="/login.html">← Back to Login</a>
        </div>
    </div>

    <script>
        /**
         * Password Reset Script - Handles password reset workflow
         */

        const tokenParam = new URLSearchParams(window.location.search).get('token');
        if (tokenParam) {
            document.getElementById('token').value = tokenParam;
            validateTokenAuto();
        }

        /**
         * Validate reset token
         */
        function validateToken(event) {
            event.preventDefault();
            const token = document.getElementById('token').value;

            fetch('/api/auth/validate-reset-token?token=' + token, {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(response => response.json())
            .then(isValid => {
                if (isValid) {
                    showStep2();
                    document.getElementById('message').textContent = '';
                } else {
                    showMessage('Invalid or expired token', 'error');
                }
            })
            .catch(error => {
                showMessage('Error validating token', 'error');
                console.error('Error:', error);
            });
        }

        /**
         * Auto validate token if provided in URL
         */
        function validateTokenAuto() {
            if (tokenParam) {
                fetch('/api/auth/validate-reset-token?token=' + tokenParam, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(response => response.json())
                .then(isValid => {
                    if (isValid) {
                        showStep2();
                    } else {
                        showMessage('Invalid or expired token', 'error');
                    }
                });
            }
        }

        /**
         * Reset password
         */
        function resetPassword(event) {
            event.preventDefault();
            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            fetch('/api/auth/reset-password?token=' + token + '&newPassword=' + encodeURIComponent(newPassword), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(response => response.text())
            .then(message => {
                showStep3();
            })
            .catch(error => {
                showMessage('Error resetting password', 'error');
                console.error('Error:', error);
            });
        }

        /**
         * Show message
         */
        function showMessage(text, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = 'message ' + type;
        }

        /**
         * Show token validation step
         */
        function showStep2() {
            document.getElementById('tokenStep').style.display = 'none';
            document.getElementById('passwordStep').style.display = 'block';
            document.getElementById('step1').classList.add('active');
            document.getElementById('step2').classList.add('active');
        }

        /**
         * Show success step
         */
        function showStep3() {
            document.getElementById('passwordStep').style.display = 'none';
            document.getElementById('successStep').style.display = 'block';
            document.getElementById('step3').classList.add('active');
        }
    </script>
</body>
</html>
