<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification - School Information System</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        p {
            color: #7f8c8d;
            margin: 0.5rem 0;
        }

        .loading {
            font-size: 2rem;
            margin: 2rem 0;
        }

        .success {
            color: #27ae60;
        }

        .error {
            color: #e74c3c;
        }

        .btn {
            background: #667eea;
            color: white;
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 1.5rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Email Verification</h1>
        <p id="status">Verifying your email...</p>
        <div class="loading" id="loader">⏳</div>
        <div id="result" style="display: none; margin: 2rem 0;"></div>
        <button class="btn" id="continueBtn" style="display: none;" onclick="window.location.href='/login.html'">Continue to Login</button>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');

        if (!token) {
            document.getElementById('status').textContent = 'No verification token provided';
            document.getElementById('status').className = 'error';
            document.getElementById('loader').style.display = 'none';
        } else {
            verifyEmail();
        }

        function verifyEmail() {
            fetch('/api/auth/verify-email?token=' + token, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(response => response.text())
            .then(message => {
                document.getElementById('loader').innerHTML = '✅';
                document.getElementById('loader').className = 'success';
                document.getElementById('status').textContent = 'Email Verified Successfully!';
                document.getElementById('status').className = 'success';
                document.getElementById('result').style.display = 'block';
                document.getElementById('result').innerHTML = '<p>Your email address has been verified. You can now access all features of the portal.</p>';
                document.getElementById('continueBtn').style.display = 'block';
            })
            .catch(error => {
                document.getElementById('loader').innerHTML = '❌';
                document.getElementById('loader').className = 'error';
                document.getElementById('status').textContent = 'Verification Failed';
                document.getElementById('status').className = 'error';
                document.getElementById('result').style.display = 'block';
                document.getElementById('result').innerHTML = '<p>The verification link is invalid or has expired. Please try again.</p>';
            });
        }
    </script>
</body>
</html>
