<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d6efd">
    <link rel="manifest" href="/manifest.json">
    <script src="js/app.js"></script>
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="./css/style.css" />
    <title>School Portal PWA</title>
</head>
<body class="bg-light">

    <div class="container py-5">
        <header class="text-center mb-5" id="headerSection">
            <h1 class="display-5 fw-bold text-primary">School Portal</h1>
            <p class="lead text-muted">Progressive Web Application for Students, Teachers, and Admins</p>
            <button id="publicPortalLink" class="btn btn-link text-decoration-none p-0">View Public Portal</button>
        </header>

        <div id="alertContainer" class="mb-4"></div>

        <div id="loginSection" class="card shadow-sm mx-auto" style="max-width: 450px;">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h2 class="h3 fw-normal">Welcome Back</h2>
                    <p class="text-muted small">Sign in to your account</p>
                </div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input id="username" type="text" class="form-control" placeholder="Enter your username" required />
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input id="password" type="password" class="form-control" placeholder="Enter your password" required />
                    </div>
                    <button id="loginButton" type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
                </form>

                <p class="text-muted text-center mt-4 small">Demo: admin / admin123</p>
            </div>
        </div>

        <div id="dashboardSection" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
                <div>
                    <h2 id="dashboardTitle" class="h3 mb-1 text-dark"></h2>
                    <p id="dashboardSubtitle" class="text-muted mb-0"></p>
                </div>
                <button id="logoutButton" class="btn btn-outline-danger">Logout</button>
            </div>

            <ul class="nav nav-pills mb-4" id="dashboardTabs">
                <li class="nav-item">
                    <button class="nav-link active" onclick="switchTab('overview')">Overview</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" onclick="switchTab('charts')">Analytics</button>
                </li>
            </ul>

            <div id="tab-content">
                <div id="content-overview">
                    <div id="announcementsSection" class="mb-4">
                        <h3 class="h6 text-uppercase fw-bold text-secondary mb-3">📢 Announcements</h3>
                        <div id="announcementsList" class="row g-3"></div>
                    </div>
                    <div id="dashboardContent" class="row g-4"></div>
                </div>

                <div id="content-charts" class="d-none">
                    <div class="row g-4">
                        <div class="col-md-6 col-lg-4">
                            <div class="card p-3 h-100 border-0 shadow-sm">
                                <h6 class="text-muted small">Enrollment Trends</h6>
                                <canvas id="enrollmentChart"></canvas>
                            </div>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <div class="card p-3 h-100 border-0 shadow-sm">
                                <h6 class="text-muted small">Performance</h6>
                                <canvas id="performanceChart"></canvas>
                            </div>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <div class="card p-3 h-100 border-0 shadow-sm">
                                <h6 class="text-muted small">Finance Status</h6>
                                <canvas id="financeChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="publicPortalSection" class="d-none">
            <div class="card border-0 shadow-sm p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="h4 mb-1">🌐 Public Portal</h2>
                        <p class="text-muted small mb-0">Browse school information and announcements</p>
                    </div>
                    <button id="backToLoginButton" class="btn btn-sm btn-outline-primary">Back to Login</button>
                </div>
                <hr>
                <div id="publicContent"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/app.js" defer></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed', err));
            });
        }
    </script>
</body>
</html>
